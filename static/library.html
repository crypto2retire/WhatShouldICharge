<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Reference Library — WhatShouldICharge</title>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f1117; --surface: #1a1d27; --border: #2a2d3a;
    --text: #e2e8f0; --muted: #8892a4; --accent: #22c55e;
    --blue: #818cf8; --amber: #f59e0b;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  .nav-bar { display: flex; align-items: center; justify-content: space-between; padding: 14px 24px; background: var(--surface); border-bottom: 1px solid var(--border); }
  .nav-left { display: flex; align-items: center; gap: 8px; }
  .nav-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); }
  .nav-brand { font-weight: 700; font-size: 1.05rem; color: var(--text); text-decoration: none; }
  .nav-right { display: flex; align-items: center; gap: 16px; }
  .nav-link { color: var(--muted); text-decoration: none; cursor: pointer; transition: color 0.15s; font-size: 0.9rem; }
  .nav-link:hover { color: var(--text); }
  .nav-link.active { color: var(--accent); }

  .container { max-width: 1000px; margin: 0 auto; padding: 24px 16px; }
  .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
  .page-title { font-size: 1.4rem; font-weight: 700; }

  .stats-row { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 18px; flex: 1; min-width: 140px; }
  .stat-val { font-size: 1.5rem; font-weight: 700; color: var(--accent); }
  .stat-label { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }

  .controls { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
  .search-input { flex: 1; min-width: 200px; padding: 10px 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); color: var(--text); font-size: 0.9rem; outline: none; }
  .search-input:focus { border-color: var(--accent); }
  .sort-btn { padding: 8px 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); color: var(--muted); cursor: pointer; font-size: 0.82rem; transition: all 0.15s; }
  .sort-btn:hover, .sort-btn.active { border-color: var(--accent); color: var(--accent); }

  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
  th { text-align: left; padding: 10px 12px; color: var(--muted); font-weight: 600; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); }
  td { padding: 10px 12px; border-bottom: 1px solid rgba(42,45,58,0.5); }
  tr:hover td { background: rgba(34,197,94,0.03); }
  .source-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.72rem; font-weight: 600; text-transform: uppercase; }
  .source-builtin { background: rgba(34,197,94,0.12); color: #22c55e; }
  .source-ai_learned { background: rgba(245,158,11,0.12); color: #f59e0b; }
  .source-web_search { background: rgba(129,140,248,0.12); color: #818cf8; }
  .source-manual { background: rgba(226,232,240,0.12); color: #e2e8f0; }
  .special-tag { color: #ef4444; font-weight: 600; font-size: 0.8rem; }
  .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
  .cy-val { font-weight: 600; color: var(--accent); }
  .times-seen { font-weight: 600; }

  .edit-btn { background: none; border: 1px solid var(--border); color: var(--muted); padding: 4px 10px; border-radius: 6px; cursor: pointer; font-size: 0.78rem; transition: all 0.15s; }
  .edit-btn:hover { border-color: var(--accent); color: var(--accent); }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; }
  .modal-overlay.visible { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 28px; width: 90%; max-width: 440px; }
  .modal-title { font-size: 1.15rem; font-weight: 700; margin-bottom: 20px; }
  .modal-field { margin-bottom: 16px; }
  .modal-field label { display: block; font-size: 0.8rem; color: var(--muted); margin-bottom: 6px; font-weight: 600; }
  .modal-field input, .modal-field select { width: 100%; padding: 10px 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 0.9rem; outline: none; }
  .modal-field input:focus, .modal-field select:focus { border-color: var(--accent); }
  .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
  .modal-actions button { flex: 1; padding: 10px; border-radius: 8px; font-weight: 600; font-size: 0.9rem; cursor: pointer; border: none; }
  .btn-save { background: var(--accent); color: #000; }
  .btn-save:hover { opacity: 0.9; }
  .btn-cancel { background: var(--border); color: var(--text); }
  .btn-cancel:hover { background: #3a3d4a; }
  .checkbox-row { display: flex; align-items: center; gap: 10px; }
  .checkbox-row input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--accent); }
  .save-status { font-size: 0.82rem; color: var(--accent); text-align: center; margin-top: 10px; min-height: 20px; }
  .item-name-display { font-weight: 600; color: var(--accent); font-size: 0.95rem; margin-bottom: 4px; }
</style>
</head>
<body>
<div class="nav-bar">
  <div class="nav-left">
    <span class="nav-dot"></span>
    <a href="/" class="nav-brand">WhatShouldICharge</a>
  </div>
  <div class="nav-right">
    <a href="/estimate" class="nav-link">Estimator</a>
    <a href="/library" class="nav-link active">Library</a>
    <a href="#" class="nav-link" id="nav-logout">Logout</a>
  </div>
</div>

<div class="container">
  <div class="page-header">
    <h1 class="page-title">Reference Library</h1>
  </div>

  <div class="stats-row" id="stats-row">
    <div class="stat-card"><div class="stat-val" id="stat-total">—</div><div class="stat-label">Total Items</div></div>
    <div class="stat-card"><div class="stat-val" id="stat-builtin">—</div><div class="stat-label">Built-in</div></div>
    <div class="stat-card"><div class="stat-val" id="stat-learned">—</div><div class="stat-label">AI Learned</div></div>
    <div class="stat-card"><div class="stat-val" id="stat-web">—</div><div class="stat-label">Web Search</div></div>
  </div>

  <div class="controls">
    <input type="text" class="search-input" id="search-input" placeholder="Search items...">
    <button class="sort-btn active" data-sort="times_seen">Most Seen</button>
    <button class="sort-btn" data-sort="name">Name</button>
    <button class="sort-btn" data-sort="recent">Recent</button>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Item Name</th>
          <th>Category</th>
          <th>CY</th>
          <th>Dimensions</th>
          <th>Source</th>
          <th>Seen</th>
          <th>Special</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="library-body"></tbody>
    </table>
  </div>
  <div class="empty-state" id="empty-state" style="display:none">No items found</div>
</div>

<div class="modal-overlay" id="edit-modal" role="dialog" aria-modal="true" aria-label="Edit library item">
  <div class="modal">
    <div class="modal-title">Edit Item</div>
    <div class="item-name-display" id="edit-item-name"></div>
    <div class="modal-field">
      <label for="edit-cy">Cubic Yards (CY)</label>
      <input type="number" id="edit-cy" step="0.01" min="0">
    </div>
    <div class="modal-field">
      <label for="edit-dims">Dimensions (L×W×H)</label>
      <input type="text" id="edit-dims" placeholder="e.g. 84×36×34 in">
    </div>
    <div class="modal-field">
      <label for="edit-category">Category</label>
      <input type="text" id="edit-category">
    </div>
    <div class="modal-field">
      <div class="checkbox-row">
        <input type="checkbox" id="edit-special">
        <label for="edit-special" style="margin-bottom:0">Recycling / Special Fee Item</label>
      </div>
    </div>
    <div class="modal-field" id="fee-field" style="display:none">
      <label for="edit-fee">Special Fee ($)</label>
      <input type="number" id="edit-fee" step="1" min="0">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveItem()">Save Changes</button>
    </div>
    <div class="save-status" id="save-status"></div>
  </div>
</div>

<script>
function getCsrfToken() {
  var match = document.cookie.match(/(?:^|;\s*)csrf_token=([^;]*)/);
  return match ? match[1] : '';
}

var allItems = [];
var currentSort = 'times_seen';
var editingId = null;

document.getElementById('nav-logout').addEventListener('click', async function() {
  await fetch('/api/auth/logout', { method: 'POST', headers: {'X-CSRF-Token': getCsrfToken()} });
  window.location.href = '/login';
});

async function loadLibrary() {
  try {
    var responses = await Promise.all([
      fetch('/api/library'),
      fetch('/api/library/stats')
    ]);
    if (responses[0].status === 401) { window.location.href = '/login'; return; }
    allItems = await responses[0].json();
    var stats = await responses[1].json();

    document.getElementById('stat-total').textContent = stats.total_items || 0;
    document.getElementById('stat-builtin').textContent = (stats.by_source && stats.by_source.builtin) || 0;
    document.getElementById('stat-learned').textContent = (stats.by_source && stats.by_source.ai_learned) || 0;
    document.getElementById('stat-web').textContent = (stats.by_source && stats.by_source.web_search) || 0;

    renderTable(sortItems(allItems, currentSort));
  } catch (e) {
    console.error('Failed to load library:', e);
  }
}

function esc(str) {
  var d = document.createElement('div');
  d.textContent = String(str);
  return d.innerHTML;
}

function renderTable(items) {
  var tbody = document.getElementById('library-body');
  var empty = document.getElementById('empty-state');
  tbody.innerHTML = '';

  if (!items.length) { empty.style.display = 'block'; return; }
  empty.style.display = 'none';

  items.forEach(function(item) {
    var tr = document.createElement('tr');
    var specialHtml = item.is_special
      ? '<span class="special-tag">$' + (parseFloat(item.special_fee) || 0) + '</span>'
      : '<span style="color:var(--muted)">—</span>';
    var dimsHtml = item.dimensions ? '<span style="font-size:0.78rem;color:var(--blue)">' + esc(item.dimensions) + '</span>' : '<span style="color:var(--muted);font-size:0.78rem">—</span>';
    tr.innerHTML =
      '<td>' + esc(item.item_name) + '</td>' +
      '<td style="color:var(--muted)">' + esc(item.item_category) + '</td>' +
      '<td><span class="cy-val">' + (parseFloat(item.cubic_yards) || 0) + '</span></td>' +
      '<td>' + dimsHtml + '</td>' +
      '<td><span class="source-badge source-' + esc(item.source) + '">' + esc(item.source.replace('_', ' ')) + '</span></td>' +
      '<td><span class="times-seen">' + (parseInt(item.times_seen) || 0) + '</span></td>' +
      '<td>' + specialHtml + '</td>' +
      '<td><button class="edit-btn" data-id="' + item.id + '">Edit</button></td>';
    tbody.appendChild(tr);
  });

  tbody.querySelectorAll('.edit-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      openEditModal(parseInt(btn.dataset.id));
    });
  });
}

function openEditModal(id) {
  var item = allItems.find(function(i) { return i.id === id; });
  if (!item) return;
  editingId = id;
  document.getElementById('edit-item-name').textContent = item.item_name;
  document.getElementById('edit-cy').value = parseFloat(item.cubic_yards) || 0;
  document.getElementById('edit-dims').value = item.dimensions || '';
  document.getElementById('edit-category').value = item.item_category || '';
  document.getElementById('edit-special').checked = !!item.is_special;
  document.getElementById('edit-fee').value = parseFloat(item.special_fee) || 0;
  document.getElementById('fee-field').style.display = item.is_special ? 'block' : 'none';
  document.getElementById('save-status').textContent = '';
  document.getElementById('edit-modal').classList.add('visible');
}

document.getElementById('edit-special').addEventListener('change', function() {
  document.getElementById('fee-field').style.display = this.checked ? 'block' : 'none';
});

function closeModal() {
  document.getElementById('edit-modal').classList.remove('visible');
  editingId = null;
}

document.getElementById('edit-modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeModal();
});

async function saveItem() {
  if (!editingId) return;
  var statusEl = document.getElementById('save-status');
  statusEl.textContent = 'Saving...';
  statusEl.style.color = 'var(--muted)';

  var body = {
    cubic_yards: parseFloat(document.getElementById('edit-cy').value) || 0,
    dimensions: document.getElementById('edit-dims').value.trim(),
    item_category: document.getElementById('edit-category').value.trim(),
    is_special: document.getElementById('edit-special').checked,
    special_fee: document.getElementById('edit-special').checked ? (parseFloat(document.getElementById('edit-fee').value) || 0) : 0
  };

  try {
    var resp = await fetch('/api/library/' + editingId, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'X-CSRF-Token': getCsrfToken() },
      body: JSON.stringify(body)
    });
    if (!resp.ok) throw new Error('Failed');

    var item = allItems.find(function(i) { return i.id === editingId; });
    if (item) {
      item.cubic_yards = body.cubic_yards;
      item.dimensions = body.dimensions;
      item.item_category = body.item_category;
      item.is_special = body.is_special;
      item.special_fee = body.special_fee;
    }

    statusEl.textContent = 'Saved';
    statusEl.style.color = 'var(--accent)';

    var q = document.getElementById('search-input').value.toLowerCase().trim();
    var filtered = q ? allItems.filter(function(i) { return i.item_name.toLowerCase().includes(q); }) : allItems;
    renderTable(sortItems(filtered, currentSort));

    setTimeout(closeModal, 800);
  } catch (e) {
    statusEl.textContent = 'Error saving. Try again.';
    statusEl.style.color = '#ef4444';
  }
}

document.getElementById('search-input').addEventListener('input', function(e) {
  var q = e.target.value.toLowerCase().trim();
  var filtered = q ? allItems.filter(function(i) { return i.item_name.toLowerCase().includes(q); }) : allItems;
  renderTable(sortItems(filtered, currentSort));
});

document.querySelectorAll('.sort-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.sort-btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    currentSort = btn.dataset.sort;
    var q = document.getElementById('search-input').value.toLowerCase().trim();
    var filtered = q ? allItems.filter(function(i) { return i.item_name.toLowerCase().includes(q); }) : allItems;
    renderTable(sortItems(filtered, currentSort));
  });
});

function sortItems(items, sort) {
  var copy = items.slice();
  if (sort === 'name') copy.sort(function(a, b) { return a.item_name.localeCompare(b.item_name); });
  else if (sort === 'recent') copy.sort(function(a, b) { return (b.created_at || '').localeCompare(a.created_at || ''); });
  else copy.sort(function(a, b) { return b.times_seen - a.times_seen; });
  return copy;
}

loadLibrary();
</script>
</body>
</html>
