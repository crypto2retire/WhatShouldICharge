<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up — WhatShouldICharge</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f1117; --surface: #1a1d27; --border: #2e3352;
    --green: #16a34a; --green-light: #22c55e;
    --text: #e8eaf0; --muted: #7b82a0; --red: #ef4444;
  }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .auth-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 40px; width: 100%; max-width: 440px; }
  .logo { text-align: center; margin-bottom: 28px; }
  .logo-dot { display: inline-block; width: 8px; height: 8px; background: var(--green); border-radius: 50%; box-shadow: 0 0 8px var(--green); margin-right: 8px; vertical-align: middle; }
  .logo-text { font-size: 1.2rem; font-weight: 800; letter-spacing: -0.03em; }
  .auth-title { font-size: 1.5rem; font-weight: 800; text-align: center; margin-bottom: 8px; }
  .auth-sub { text-align: center; color: var(--muted); font-size: 0.9rem; margin-bottom: 28px; }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 0.83rem; font-weight: 600; color: var(--muted); margin-bottom: 6px; }
  .form-group input, .form-group select { width: 100%; padding: 11px 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 0.93rem; font-family: inherit; transition: border-color 0.15s; }
  .form-group input:focus, .form-group select:focus { outline: none; border-color: var(--green); }
  .form-row { display: flex; gap: 12px; }
  .form-row .form-group { flex: 1; }
  .btn-submit { width: 100%; padding: 13px; border-radius: 10px; border: none; background: var(--green); color: #fff; font-size: 1rem; font-weight: 700; cursor: pointer; transition: all 0.15s; margin-top: 8px; }
  .btn-submit:hover { background: var(--green-light); }
  .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }
  .auth-footer { text-align: center; margin-top: 22px; font-size: 0.85rem; color: var(--muted); }
  .auth-footer a { color: var(--green-light); text-decoration: none; font-weight: 600; }
  .auth-footer a:hover { text-decoration: underline; }
  .error-msg { display: none; background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); border-radius: 8px; padding: 10px 14px; color: var(--red); font-size: 0.85rem; margin-bottom: 16px; }
  .error-msg.visible { display: block; }
  .free-badge { text-align: center; margin-bottom: 24px; }
  .free-badge span { display: inline-block; background: rgba(22,163,74,0.12); border: 1px solid rgba(22,163,74,0.3); color: var(--green-light); padding: 5px 14px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; }
</style>
</head>
<body>
<main class="auth-card">
  <div class="logo"><span class="logo-dot"></span><span class="logo-text">WhatShouldICharge</span></div>
  <div class="auth-title">Create your account</div>
  <div class="auth-sub">Get 3 free estimates to try the platform</div>
  <div class="free-badge"><span>3 Free Estimates Included</span></div>
  <div class="error-msg" id="error-msg" role="alert"></div>
  <form id="signup-form">
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" required autocomplete="email" placeholder="you@company.com">
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" required autocomplete="new-password" placeholder="At least 6 characters" minlength="6">
    </div>
    <div class="form-group">
      <label for="company_name">Company Name</label>
      <input type="text" id="company_name" placeholder="Your junk removal company">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label for="company_city">City</label>
        <input type="text" id="company_city" placeholder="Dallas">
      </div>
      <div class="form-group">
        <label for="company_state">State</label>
        <input type="text" id="company_state" placeholder="TX" maxlength="2">
      </div>
    </div>
    <button type="submit" class="btn-submit" id="submit-btn">Create Account</button>
  </form>
  <div class="auth-footer">Already have an account? <a href="/login">Log in</a></div>
</main>
<script>
const form = document.getElementById('signup-form');
const errorMsg = document.getElementById('error-msg');
const submitBtn = document.getElementById('submit-btn');

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  errorMsg.classList.remove('visible');
  submitBtn.disabled = true;
  submitBtn.textContent = 'Creating account...';

  try {
    const resp = await fetch('/api/auth/signup', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email: document.getElementById('email').value,
        password: document.getElementById('password').value,
        company_name: document.getElementById('company_name').value,
        company_city: document.getElementById('company_city').value,
        company_state: document.getElementById('company_state').value,
      }),
    });
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.detail || 'Signup failed');
    window.location.href = data.redirect || '/estimate';
  } catch (err) {
    errorMsg.textContent = err.message;
    errorMsg.classList.add('visible');
    submitBtn.disabled = false;
    submitBtn.textContent = 'Create Account';
  }
});
</script>
</body>
</html>
