<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Payment Success — WhatShouldICharge</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d1117; --surface: #161b22; --border: #21262d;
    --green: #16a34a; --green-light: #22c55e;
    --text: #e6edf3; --muted: #8b949e;
  }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 48px; max-width: 480px; text-align: center; }
  .check-icon { width: 72px; height: 72px; background: rgba(22,163,74,0.15); border: 2px solid var(--green); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 24px; font-size: 2rem; }
  h1 { font-size: 1.8rem; font-weight: 800; margin-bottom: 12px; }
  .sub { font-size: 1rem; color: var(--muted); margin-bottom: 32px; line-height: 1.6; }
  .credit-info { color: var(--green-light); font-weight: 700; }
  .btn { display: inline-flex; align-items: center; gap: 8px; padding: 14px 30px; border-radius: 10px; background: var(--green); color: #fff; font-size: 1rem; font-weight: 700; text-decoration: none; transition: all 0.15s; border: none; cursor: pointer; }
  .btn:hover { background: var(--green-light); transform: translateY(-1px); }
  .note { font-size: 0.82rem; color: var(--muted); margin-top: 22px; }
</style>
</head>
<body>
<div class="card">
  <div class="check-icon">&#10003;</div>
  <h1>Credits added!</h1>
  <div class="sub" id="credit-msg">Your estimate credits have been added to your account.<br>Start using AI-powered estimates right away.</div>
  <a href="/estimate" class="btn">Start Estimating &#8594;</a>
  <div class="note">A confirmation email has been sent to your inbox.</div>
</div>
<script>
(async () => {
  try {
    const resp = await fetch('/api/auth/me');
    const data = await resp.json();
    if (data.authenticated) {
      const bal = data.credit_balance || 0;
      document.getElementById('credit-msg').innerHTML =
        `<span class="credit-info">${bal} credit${bal !== 1 ? 's' : ''}</span> available in your account.<br>Start using AI-powered estimates right away.`;
    }
  } catch(e) {}
})();
</script>
<style>#cookie-banner{position:fixed;bottom:0;left:0;right:0;z-index:9999;background:#161b22;border-top:1px solid #21262d;padding:16px 24px;display:none;font-family:'Inter',system-ui,sans-serif}#cookie-banner.show{display:block}#cookie-banner p{color:#8b949e;font-size:0.875rem;margin:0 0 12px;line-height:1.5}#cookie-banner p a{color:#16a34a;text-decoration:none}#cookie-banner p a:hover{text-decoration:underline}#cookie-banner .btn-group{display:flex;gap:10px;flex-wrap:wrap}#cookie-banner button{border:none;border-radius:6px;padding:9px 18px;font-size:0.875rem;font-weight:600;cursor:pointer;transition:opacity 0.2s}#cookie-banner .btn-accept{background:#16a34a;color:#fff}#cookie-banner .btn-accept:hover{opacity:0.9}#cookie-banner .btn-decline{background:#21262d;color:#8b949e}#cookie-banner .btn-decline:hover{opacity:0.8}</style>
<div id="cookie-banner"><p>We use cookies to measure marketing effectiveness via Facebook Pixel. See our <a href="/privacy">Privacy Policy</a> for details.</p><div class="btn-group"><button class="btn-accept" onclick="window.acceptCookies()">Accept</button><button class="btn-decline" onclick="window.declineCookies()">Decline</button></div></div>
<script>(function(){var c=localStorage.getItem('wsic_cookie_consent');if(!c){document.getElementById('cookie-banner').classList.add('show');}window.acceptCookies=function(){localStorage.setItem('wsic_cookie_consent','accepted');document.getElementById('cookie-banner').classList.remove('show');loadFBPixel();fbq('track','PageView');};window.declineCookies=function(){localStorage.setItem('wsic_cookie_consent','declined');document.getElementById('cookie-banner').classList.remove('show');};function loadFBPixel(){if(window.fbq)return;!function(f,b,e,v,n,t,s){if(f.fbq)return;n=f.fbq=function(){n.callMethod?n.callMethod.apply(n,arguments):n.queue.push(arguments)};if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';n.queue=[];t=b.createElement(e);t.async=!0;t.src=v;s=b.getElementsByTagName(e)[0];s.parentNode.insertBefore(t,s)}(window,document,'script','https://connect.facebook.net/en_US/fbevents.js');fbq('init','1519465685959015');}if(c==='accepted'){loadFBPixel();fbq('track','PageView');}})();</script>
</body>
</html>
