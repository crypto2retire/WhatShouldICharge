<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — WhatShouldICharge</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f1117; --surface: #1a1d27; --border: #2e3352;
    --green: #16a34a; --green-light: #22c55e;
    --text: #e8eaf0; --muted: #7b82a0; --red: #ef4444;
  }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .auth-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 40px; width: 100%; max-width: 420px; }
  .logo { text-align: center; margin-bottom: 32px; }
  .logo-dot { display: inline-block; width: 8px; height: 8px; background: var(--green); border-radius: 50%; box-shadow: 0 0 8px var(--green); margin-right: 8px; vertical-align: middle; }
  .logo-text { font-size: 1.2rem; font-weight: 800; letter-spacing: -0.03em; }
  .auth-title { font-size: 1.5rem; font-weight: 800; text-align: center; margin-bottom: 8px; }
  .auth-sub { text-align: center; color: var(--muted); font-size: 0.9rem; margin-bottom: 28px; }
  .form-group { margin-bottom: 18px; }
  .form-group label { display: block; font-size: 0.83rem; font-weight: 600; color: var(--muted); margin-bottom: 6px; }
  .form-group input { width: 100%; padding: 12px 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 0.95rem; font-family: inherit; transition: border-color 0.15s; }
  .form-group input:focus { outline: none; border-color: var(--green); }
  .form-group .hint { font-size: 0.78rem; color: var(--muted); margin-top: 4px; }
  .btn-submit { width: 100%; padding: 13px; border-radius: 10px; border: none; background: var(--green); color: #fff; font-size: 1rem; font-weight: 700; cursor: pointer; transition: all 0.15s; margin-top: 8px; }
  .btn-submit:hover { background: var(--green-light); }
  .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }
  .error-msg { display: none; background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); border-radius: 8px; padding: 10px 14px; color: var(--red); font-size: 0.85rem; margin-bottom: 16px; }
  .error-msg.visible { display: block; }
  .success-msg { display: none; background: rgba(22,197,94,0.1); border: 1px solid rgba(22,197,94,0.3); border-radius: 8px; padding: 10px 14px; color: var(--green-light); font-size: 0.85rem; margin-bottom: 16px; }
  .success-msg.visible { display: block; }
  .auth-footer { text-align: center; margin-top: 22px; font-size: 0.85rem; color: var(--muted); }
  .auth-footer a { color: var(--green-light); text-decoration: none; font-weight: 600; }
  .auth-footer a:hover { text-decoration: underline; }
  #reset-form.hidden { display: none; }
  .invalid-state { text-align: center; }
  .invalid-state p { color: var(--muted); margin-bottom: 16px; }
</style>
</head>
<body>
<main class="auth-card">
  <div class="logo"><span class="logo-dot"></span><span class="logo-text">WhatShouldICharge</span></div>

  <div id="invalid-state" class="invalid-state" style="display:none;">
    <div class="auth-title">Invalid Link</div>
    <div class="auth-sub">This password reset link is missing required information.</div>
    <p>Please request a new reset link from the login page.</p>
    <div class="auth-footer"><a href="/login">Back to Login</a></div>
  </div>

  <div id="reset-section" style="display:none;">
    <div class="auth-title">Reset Your Password</div>
    <div class="auth-sub">Enter your new password below</div>
    <div class="error-msg" id="error-msg" role="alert"></div>
    <div class="success-msg" id="success-msg"></div>
    <form id="reset-form">
      <div class="form-group">
        <label for="new-password">New Password</label>
        <input type="password" id="new-password" required autocomplete="new-password" placeholder="At least 8 characters" minlength="8">
        <div class="hint">Must be at least 8 characters</div>
      </div>
      <div class="form-group">
        <label for="confirm-password">Confirm Password</label>
        <input type="password" id="confirm-password" required autocomplete="new-password" placeholder="Re-enter your password" minlength="8">
      </div>
      <button type="submit" class="btn-submit" id="submit-btn">Reset Password</button>
    </form>
    <div id="success-actions" style="display:none;" class="auth-footer">
      <a href="/login">Log in with your new password</a>
    </div>
  </div>
</main>
<script>
(function() {
  var params = new URLSearchParams(window.location.search);
  var token = params.get('token');
  var email = params.get('email');

  var invalidState = document.getElementById('invalid-state');
  var resetSection = document.getElementById('reset-section');
  var resetForm = document.getElementById('reset-form');
  var errorMsg = document.getElementById('error-msg');
  var successMsg = document.getElementById('success-msg');
  var submitBtn = document.getElementById('submit-btn');
  var successActions = document.getElementById('success-actions');

  if (!token || !email) {
    invalidState.style.display = 'block';
    return;
  }

  resetSection.style.display = 'block';

  resetForm.addEventListener('submit', async function(e) {
    e.preventDefault();
    errorMsg.classList.remove('visible');
    successMsg.classList.remove('visible');

    var newPw = document.getElementById('new-password').value;
    var confirmPw = document.getElementById('confirm-password').value;

    if (newPw !== confirmPw) {
      errorMsg.textContent = 'Passwords do not match.';
      errorMsg.classList.add('visible');
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = 'Resetting...';

    try {
      var resp = await fetch('/api/auth/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token: token, email: email, new_password: newPw }),
      });
      var data = await resp.json();
      if (!resp.ok) throw new Error(data.detail || 'Reset failed');

      successMsg.textContent = data.message;
      successMsg.classList.add('visible');
      resetForm.classList.add('hidden');
      successActions.style.display = 'block';
    } catch (err) {
      errorMsg.textContent = err.message;
      errorMsg.classList.add('visible');
      submitBtn.disabled = false;
      submitBtn.textContent = 'Reset Password';
    }
  });
})();
</script>
</body>
</html>
