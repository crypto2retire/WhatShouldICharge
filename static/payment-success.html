<meta charset="UTF-8">

<title>Payment Success — WhatShouldICharge</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d1117; --surface: #161b22; --border: #21262d;
    --green: #16a34a; --green-light: #22c55e;
    --text: #e6edf3; --muted: #8b949e;
  }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 48px; max-width: 480px; text-align: center; }
  .check-icon { width: 72px; height: 72px; background: rgba(22,163,74,0.15); border: 2px solid var(--green); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 24px; font-size: 2rem; }
  h1 { font-size: 1.8rem; font-weight: 800; margin-bottom: 12px; }
  .sub { font-size: 1rem; color: var(--muted); margin-bottom: 32px; line-height: 1.6; }
  .credit-info { color: var(--green-light); font-weight: 700; }
  .btn { display: inline-flex; align-items: center; gap: 8px; padding: 14px 30px; border-radius: 10px; background: var(--green); color: #fff; font-size: 1rem; font-weight: 700; text-decoration: none; transition: all 0.15s; border: none; cursor: pointer; }
  .btn:hover { background: var(--green-light); transform: translateY(-1px); }
  .note { font-size: 0.82rem; color: var(--muted); margin-top: 22px; }
</style>
</head>
<body>
<div class="card">
  <div class="check-icon">&#10003;</div>
  <h1>Credits added!</h1>
  <div class="sub" id="credit-msg">Your estimate credits have been added to your account.<br>Start using AI-powered estimates right away.</div>
  <a href="/estimate" class="btn">Start Estimating &#8594;</a>
  <div class="note">A confirmation email has been sent to your inbox.</div>
</div>
<script>
(async () => {
  try {
    const resp = await fetch('/api/auth/me');
    const data = await resp.json();
    if (data.authenticated) {
      const bal = data.credit_balance || 0;
      document.getElementById('credit-msg').innerHTML =
        `<span class="credit-info">${bal} credit${bal !== 1 ? 's' : ''}</span> available in your account.<br>Start using AI-powered estimates right away.`;
    }
  } catch(e) {}
})();
</script>
</body>
</html>
