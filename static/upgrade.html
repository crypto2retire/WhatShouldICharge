<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buy Credits — WhatShouldICharge</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d1117; --bg2: #161b22; --border: #21262d;
    --green: #16a34a; --green-light: #22c55e;
    --text: #e6edf3; --muted: #8b949e; --muted2: #6e7681;
  }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; min-height: 100vh; }
  .wrap { max-width: 1100px; margin: 0 auto; padding: 60px 24px 80px; text-align: center; }
  .icon-big { font-size: 3rem; margin-bottom: 16px; }
  h1 { font-size: 2rem; font-weight: 800; margin-bottom: 10px; letter-spacing: -0.03em; }
  .sub { font-size: 1.05rem; color: var(--muted); margin-bottom: 16px; }
  .balance-info { font-size: 1.1rem; color: var(--green-light); font-weight: 600; margin-bottom: 48px; }
  .pricing-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; align-items: start; }
  .pricing-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; padding: 28px 24px; position: relative; text-align: left; transition: border-color 0.2s; }
  .pricing-card.popular { background: linear-gradient(180deg, #0a1f0f 0%, var(--bg2) 100%); border-color: rgba(22,163,74,0.5); transform: scale(1.03); }
  .popular-badge { position: absolute; top: -13px; left: 50%; transform: translateX(-50%); background: var(--green); color: #fff; padding: 4px 16px; border-radius: 20px; font-size: 0.72rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; white-space: nowrap; }
  .pack-name { font-size: 0.78rem; font-weight: 700; color: var(--muted2); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 14px; }
  .price { font-size: 2.2rem; font-weight: 900; letter-spacing: -0.04em; line-height: 1; margin-bottom: 4px; }
  .price sup { font-size: 1rem; font-weight: 700; vertical-align: super; }
  .per-credit { font-size: 0.82rem; color: var(--muted2); margin-bottom: 8px; }
  .credits-count { font-size: 0.95rem; font-weight: 600; color: var(--green-light); margin-bottom: 8px; }
  .discount { display: inline-block; font-size: 0.75rem; font-weight: 700; color: #fff; background: var(--green); padding: 2px 10px; border-radius: 12px; margin-bottom: 20px; }
  .no-discount { margin-bottom: 20px; height: 22px; }
  .btn-buy { display: block; width: 100%; padding: 12px; border-radius: 8px; font-size: 0.9rem; font-weight: 700; cursor: pointer; text-align: center; border: 1px solid var(--border); background: transparent; color: var(--text); transition: all 0.15s; font-family: inherit; }
  .btn-buy:hover { border-color: var(--green); color: var(--green-light); }
  .btn-buy:disabled { opacity: 0.5; cursor: wait; }
  .pricing-card.popular .btn-buy { background: var(--green); border-color: var(--green); color: #fff; }
  .pricing-card.popular .btn-buy:hover { background: var(--green-light); box-shadow: 0 4px 20px rgba(22,163,74,0.3); }
  .back-link { display: inline-block; margin-top: 32px; color: var(--muted); font-size: 0.85rem; text-decoration: none; }
  .back-link:hover { color: var(--text); }
  @media (max-width: 700px) { .pricing-card.popular { transform: none; } .pricing-grid { grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); } }
</style>
</head>
<body>
<div class="wrap">
  <div class="icon-big">&#9889;</div>
  <h1>Buy Estimate Credits</h1>
  <div class="sub">Pay per use. No subscriptions. Credits never expire.</div>
  <div class="balance-info" id="balanceInfo"></div>
  <div class="pricing-grid" id="packGrid"></div>
  <a href="/estimate" class="back-link">Back to estimator</a>
</div>
<script>
function getCsrfToken() {
  var match = document.cookie.match(/(?:^|;\s*)csrf_token=([^;]*)/);
  return match ? match[1] : '';
}

async function buyPack(packType) {
  const btns = document.querySelectorAll('.btn-buy');
  btns.forEach(b => { b.disabled = true; b.textContent = 'Loading...'; });

  try {
    const resp = await fetch('/api/payments/create-checkout', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-CSRF-Token': getCsrfToken() },
      body: JSON.stringify({ pack_type: packType }),
    });
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.detail || 'Failed to create checkout');
    window.location.href = data.checkout_url;
  } catch (err) {
    alert(err.message);
    btns.forEach(b => { b.disabled = false; b.textContent = 'Buy Now'; });
  }
}

(async () => {
  const meResp = await fetch('/api/auth/me');
  const me = await meResp.json();
  if (!me.authenticated) { window.location.href = '/login'; return; }

  const bal = me.credit_balance || 0;
  const free = me.free_trial_remaining || 0;
  let balText = `Current balance: ${bal} credit${bal !== 1 ? 's' : ''}`;
  if (free > 0) balText += ` + ${free} free trial estimate${free !== 1 ? 's' : ''}`;
  document.getElementById('balanceInfo').textContent = balText;

  const packsResp = await fetch('/api/credits/packs');
  const packsData = await packsResp.json();
  const grid = document.getElementById('packGrid');

  packsData.packs.forEach(p => {
    const isPopular = p.type === '25_pack';
    const priceStr = (p.price_cents / 100).toFixed(0);
    const perStr = (p.per_credit_cents / 100).toFixed(2);
    const card = document.createElement('div');
    card.className = 'pricing-card' + (isPopular ? ' popular' : '');
    card.innerHTML =
      (isPopular ? '<div class="popular-badge">Best Value</div>' : '') +
      `<div class="pack-name">${p.name}</div>` +
      `<div class="price"><sup>$</sup>${priceStr}</div>` +
      `<div class="per-credit">$${perStr} per estimate</div>` +
      `<div class="credits-count">${p.credits} estimate${p.credits !== 1 ? 's' : ''}</div>` +
      (p.discount_pct > 0 ? `<div class="discount">${p.discount_pct}% off</div>` : '<div class="no-discount"></div>') +
      `<button class="btn-buy" onclick="buyPack('${p.type}')">Buy Now</button>`;
    grid.appendChild(card);
  });
})();
</script>
</body>
</html>
