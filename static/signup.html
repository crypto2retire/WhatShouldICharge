<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up — WhatShouldICharge</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f1117; --surface: #1a1d27; --border: #2e3352;
    --green: #16a34a; --green-light: #22c55e;
    --text: #e8eaf0; --muted: #7b82a0; --red: #ef4444;
    --accent: #4f8ef7;
  }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .auth-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 36px; width: 100%; max-width: 440px; }
  .logo { text-align: center; margin-bottom: 24px; }
  .logo-dot { display: inline-block; width: 8px; height: 8px; background: var(--green); border-radius: 50%; box-shadow: 0 0 8px var(--green); margin-right: 8px; vertical-align: middle; }
  .logo-text { font-size: 1.2rem; font-weight: 800; letter-spacing: -0.03em; }
  .auth-title { font-size: 1.4rem; font-weight: 800; text-align: center; margin-bottom: 6px; }
  .auth-sub { text-align: center; color: var(--muted); font-size: 0.88rem; margin-bottom: 24px; }
  .free-badge { display: inline-block; background: rgba(22,163,74,0.12); border: 1px solid rgba(22,163,74,0.3); color: var(--green-light); padding: 6px 14px; border-radius: 8px; font-size: 0.85rem; font-weight: 600; margin-bottom: 20px; text-align: center; width: 100%; }
  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--muted); margin-bottom: 5px; }
  .form-group input { width: 100%; padding: 10px 13px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 0.92rem; font-family: inherit; transition: border-color 0.15s; }
  .form-group input:focus { outline: none; border-color: var(--green); }
  .form-row { display: flex; gap: 12px; }
  .form-row .form-group { flex: 1; }
  .divider { border-top: 1px solid var(--border); margin: 18px 0 14px; padding-top: 14px; }
  .divider-label { font-size: 0.9rem; font-weight: 700; margin-bottom: 4px; }
  .divider-sub { font-size: 0.78rem; color: var(--muted); margin-bottom: 12px; }
  .btn-submit { width: 100%; padding: 13px; border-radius: 10px; border: none; background: var(--green); color: #fff; font-size: 1rem; font-weight: 700; cursor: pointer; transition: all 0.15s; margin-top: 8px; }
  .btn-submit:hover { background: var(--green-light); }
  .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }
  .auth-footer { text-align: center; margin-top: 20px; font-size: 0.85rem; color: var(--muted); }
  .auth-footer a { color: var(--green-light); text-decoration: none; font-weight: 600; }
  .auth-footer a:hover { text-decoration: underline; }
  .error-msg { display: none; background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); border-radius: 8px; padding: 10px 14px; color: var(--red); font-size: 0.85rem; margin-bottom: 14px; }
  .error-msg.visible { display: block; }
</style>
</head>
<body>
<main class="auth-card">
  <div class="logo"><span class="logo-dot"></span><span class="logo-text">WhatShouldICharge</span></div>
  <div class="auth-title">Create your account</div>
  <div class="auth-sub">Start estimating junk removal jobs with AI</div>
  <div class="free-badge">2 free estimates included &mdash; no credit card needed</div>
  <div class="error-msg" id="error-msg" role="alert"></div>
  <form id="signup-form">
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" required autocomplete="email" placeholder="you@company.com">
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" required autocomplete="new-password" placeholder="At least 8 characters" minlength="8">
    </div>
    <div class="form-group">
      <label for="company_name">Company Name</label>
      <input type="text" id="company_name" placeholder="Your junk removal company">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label for="company_city">City</label>
        <input type="text" id="company_city" placeholder="Dallas">
      </div>
      <div class="form-group">
        <label for="company_state">State</label>
        <input type="text" id="company_state" placeholder="TX" maxlength="2">
      </div>
    </div>

    <div class="divider">
      <div class="divider-label">Your Pricing</div>
      <div class="divider-sub">What do you charge per cubic yard? You can change this later in settings.</div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label for="price_standard">Standard $/CY</label>
        <input type="number" id="price_standard" step="0.01" min="1" placeholder="35.00">
      </div>
      <div class="form-group">
        <label for="price_heavy">Heavy/Hoarding $/CY</label>
        <input type="number" id="price_heavy" step="0.01" min="1" placeholder="50.00">
      </div>
    </div>
    <div class="form-group">
      <label for="min_charge">Minimum Job Price ($)</label>
      <input type="number" id="min_charge" step="1" min="0" placeholder="75" style="max-width:200px;">
    </div>
    <div class="form-group" style="margin-top:8px;">
      <label style="display:flex;align-items:flex-start;gap:8px;cursor:pointer;color:var(--text);font-weight:400;">
        <input type="checkbox" id="tos-agree" style="width:auto;margin:3px 0 0;accent-color:var(--green);">
        <span style="font-size:0.82rem;line-height:1.5;">I agree to the <a href="/terms" target="_blank" style="color:var(--green-light);">Terms of Service</a> and <a href="/privacy" target="_blank" style="color:var(--green-light);">Privacy Policy</a></span>
      </label>
    </div>
    <button type="submit" class="btn-submit" id="submit-btn">Create Account</button>
  </form>
  <div class="auth-footer">Already have an account? <a href="/login">Log in</a></div>
</main>
<script>
const form = document.getElementById('signup-form');
const errorMsg = document.getElementById('error-msg');
const submitBtn = document.getElementById('submit-btn');

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  errorMsg.classList.remove('visible');
  if (!document.getElementById('tos-agree').checked) {
    errorMsg.textContent = 'Please agree to the Terms of Service and Privacy Policy.';
    errorMsg.classList.add('visible');
    return;
  }
  submitBtn.disabled = true;
  submitBtn.textContent = 'Creating account...';

  try {
    const resp = await fetch('/api/auth/signup', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email: document.getElementById('email').value,
        password: document.getElementById('password').value,
        company_name: document.getElementById('company_name').value,
        company_city: document.getElementById('company_city').value,
        company_state: document.getElementById('company_state').value,
        price_per_cy_standard: document.getElementById('price_standard').value ? parseFloat(document.getElementById('price_standard').value) : null,
        price_per_cy_heavy: document.getElementById('price_heavy').value ? parseFloat(document.getElementById('price_heavy').value) : null,
        min_charge: document.getElementById('min_charge').value ? parseFloat(document.getElementById('min_charge').value) : null,
      }),
    });
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.detail || 'Signup failed');
    window.location.href = data.redirect || '/estimate';
  } catch (err) {
    errorMsg.textContent = err.message;
    errorMsg.classList.add('visible');
    submitBtn.disabled = false;
    submitBtn.textContent = 'Create Account';
  }
});
</script>
</body>
</html>
